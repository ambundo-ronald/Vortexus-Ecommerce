services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vortexus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-VortexusLocalAdmin123!}
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  product-mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - product_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 10s
      retries: 10

  product-microservice:
    build:
      context: ./Product_Microservice
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3029
      DATABASE_URL_STRING: ${PRODUCT_MICROSERVICE_DATABASE_URL:-mongodb://product-mongo:27017/vortexus_products}
    ports:
      - "${PRODUCT_MICROSERVICE_BIND:-127.0.0.1}:${PRODUCT_MICROSERVICE_PORT:-3029}:3029"
    depends_on:
      product-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3029/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    env_file:
      - path: ${APP_ENV_FILE:-./.env.production}
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vortexus}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_HOST: http://opensearch:9200
      PRODUCT_MICROSERVICE_BASE_URL: ${PRODUCT_MICROSERVICE_BASE_URL:-http://product-microservice:3029}
      MEDIA_ROOT: /app/media
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - backend_backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      product-microservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/live/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-worker:
    build:
      context: ./Backend
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file:
      - path: ${APP_ENV_FILE:-./.env.production}
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vortexus}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_HOST: http://opensearch:9200
      PRODUCT_MICROSERVICE_BASE_URL: ${PRODUCT_MICROSERVICE_BASE_URL:-http://product-microservice:3029}
      MEDIA_ROOT: /app/media
    volumes:
      - backend_media:/app/media
      - backend_backups:/app/backups
    depends_on:
      backend:
        condition: service_started

  celery-beat:
    build:
      context: ./Backend
    restart: unless-stopped
    command: celery -A config beat -l info --schedule /tmp/celerybeat-schedule
    env_file:
      - path: ${APP_ENV_FILE:-./.env.production}
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vortexus}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_HOST: http://opensearch:9200
      PRODUCT_MICROSERVICE_BASE_URL: ${PRODUCT_MICROSERVICE_BASE_URL:-http://product-microservice:3029}
      MEDIA_ROOT: /app/media
    volumes:
      - backend_media:/app/media
      - backend_backups:/app/backups
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontendV1
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.example.com}
        VITE_API_PREFIX: ${VITE_API_PREFIX:-/api/v1}
    restart: unless-stopped
    ports:
      - "${STOREFRONT_BIND:-127.0.0.1}:${STOREFRONT_PORT:-5174}:80"

  dashboard:
    build:
      context: ./Dashboard
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://api.example.com/api/v1}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://api.example.com/api/v1}
    ports:
      - "${DASHBOARD_BIND:-127.0.0.1}:${DASHBOARD_PORT:-3000}:80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_BIND:-0.0.0.0}:${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_BIND:-0.0.0.0}:${CADDY_HTTPS_PORT:-443}:443"
    environment:
      STOREFRONT_DOMAIN: ${STOREFRONT_DOMAIN:-localhost}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-admin.localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
    volumes:
      - ${CADDYFILE_PATH:-./deploy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - backend_static:/srv/backend/static:ro
      - backend_media:/srv/backend/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - dashboard
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  product_mongo_data:
  backend_static:
  backend_media:
  backend_backups:
  caddy_data:
  caddy_config:
