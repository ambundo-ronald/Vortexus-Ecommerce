name: Storefront CI

on:
  push:
    branches: ["main", "manyisa"]
  pull_request:
    branches: ["main", "manyisa"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: storefront-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  react:
    name: React tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontendV1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontendV1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm test -- --runInBand --coverage

      - name: Build production storefront
        run: npm run build

      - name: Dependency audit report
        continue-on-error: true
        run: npm audit --audit-level=critical

  docker:
    name: Storefront Docker build
    runs-on: ubuntu-latest
    needs: react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build storefront image
        uses: docker/build-push-action@v6
        with:
          context: frontendV1
          file: frontendV1/Dockerfile
          push: false
          tags: vortexus-storefront:ci
          cache-from: type=gha,scope=frontend-v1
          cache-to: type=gha,mode=max,scope=frontend-v1
