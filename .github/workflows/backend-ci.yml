name: Backend CI

on:
  push:
    branches: ["main", "manyisa"]
  pull_request:
    branches: ["main", "manyisa"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: config.settings.local
  DJANGO_SECRET_KEY: ci-secret-key
  EMAIL_SECRET_KEY: ci-email-secret-key
  DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
  DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/vortexus
  REDIS_URL: redis://127.0.0.1:6379/0
  OPENSEARCH_HOST: http://127.0.0.1:9200
  CELERY_TASK_ALWAYS_EAGER: "true"
  CELERY_TASK_EAGER_PROPAGATES: "true"
  ENABLE_ASYNC_TASKS: "false"
  OSCAR_DEFAULT_CURRENCY: KES

jobs:
  django:
    name: Django checks and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vortexus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vortexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      opensearch:
        image: opensearchproject/opensearch:2.13.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl libjpeg-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt

      - name: Wait for OpenSearch
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:9200 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "OpenSearch did not become ready in time"
          exit 1

      - name: Compile Python modules
        run: python -m compileall apps config manage.py

      - name: Django system check
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run backend tests
        run: python manage.py test apps.content apps.notifications apps.payments --verbosity 2

      - name: Deployment-level Django check
        run: python manage.py check --deploy --fail-level ERROR

  docker:
    name: Backend Docker build
    runs-on: ubuntu-latest
    needs: django

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: Backend
          file: Backend/Dockerfile
          push: false
          tags: vortexus-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
